<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
        }
        .book-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .book-card:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .modal-bg {
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
        }
        /* Flip Animation */
        .stage-container {
            perspective: 1000px;
            width: 100%;
            height: 70vh;
        }
        .stage-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .is-flipped .stage-inner {
            transform: rotateY(180deg);
        }
        .stage-front, .stage-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            overflow: hidden;
        }
        .stage-back {
            transform: rotateY(180deg);
            background: #121212;
            border: 1px solid #333;
        }
        .transcript-container {
            scrollbar-width: thin;
            scrollbar-color: #444 #0a0a0a;
        }
        .srt-line {
            display: flex;
            gap: 1.5rem;
            padding: 0.75rem;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.2s;
        }
        .srt-time {
            color: #ff6b35;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body class="font-sans">
    <header class="p-8 bg-[#080808] sticky top-0 z-10 border-b border-[#1a1a1a]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Audio<span class="text-orange-600">Vault</span></h1>
            
            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto items-center">
                <!-- Select Library -->
                <button id="selectDirBtn" onclick="selectLibrary()" class="bg-orange-600 hover:bg-orange-700 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest text-white transition-all flex items-center gap-2 shadow-lg shadow-orange-900/20">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                    Select Library
                </button>

                <!-- Random -->
                <button onclick="shuffleLibrary()" class="bg-[#111] border border-[#222] hover:border-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest text-gray-400 transition-all flex items-center gap-2">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 3.99 3.99 5.41l5.18 5.18 1.42-1.42zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                    Random
                </button>

                <input type="text" id="search" placeholder="Quick search..." 
                    class="w-full md:w-80 px-6 py-3 bg-[#111] border border-[#222] rounded-full text-white focus:outline-none focus:border-orange-600 transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto p-12 mb-32">
        <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-12">
            <p class="col-span-full text-center text-gray-500 py-20">Please click "Select Library" to load your audiobooks.</p>
        </div>
    </main>

    <!-- Persistent Spotify-Style Player Bar -->
    <div id="playerBar" class="hidden fixed bottom-0 left-0 right-0 z-50 bg-[#121212]/70 backdrop-blur-2xl border-t border-white/5 p-3 px-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-[1800px] mx-auto flex items-center justify-between gap-8 h-16">
            
            <!-- Left: Info -->
            <div class="flex items-center gap-4 w-[30%] min-w-0 group cursor-pointer" onclick="reopenCurrentBook()">
                <div class="relative flex-shrink-0">
                    <img id="barCover" src="" class="w-14 h-14 object-cover rounded shadow-lg border border-white/10">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>
                    </div>
                </div>
                <div class="min-w-0">
                    <h4 id="barTitle" class="font-bold text-sm text-white truncate hover:underline underline-offset-2"></h4>
                    <p id="barAuthor" class="text-[11px] text-gray-400 truncate hover:text-white transition-colors"></p>
                </div>
            </div>
            
            <!-- Center: Controls & Seek -->
            <div class="flex flex-col items-center gap-2 flex-1 max-w-[40%]">
                <div class="flex items-center gap-6">
                    <button class="text-gray-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M7 6v12l10-6z"/></svg></button>
                    <button id="mainPlayBtn" onclick="togglePlayback()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg">
                        <svg id="playIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="text-gray-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M7 6v12l10-6z"/></svg></button>
                </div>
                
                <div class="w-full flex items-center gap-3">
                    <span id="currTime" class="text-[10px] text-gray-500 font-mono w-10 text-right">0:00</span>
                    <div id="progressContainer" class="flex-1 h-1 bg-white/10 rounded-full cursor-pointer relative group">
                        <div id="progressBar" class="absolute top-0 left-0 h-full bg-white group-hover:bg-orange-500 rounded-full transition-colors" style="width: 0%"></div>
                        <div id="progressHandle" class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg" style="left: 0%"></div>
                    </div>
                    <span id="totalTime" class="text-[10px] text-gray-500 font-mono w-10">0:00</span>
                </div>
            </div>

            <!-- Right: Extra Tools -->
            <div class="flex items-center justify-end gap-6 w-[30%]">
                <button onclick="reopenCurrentBook()" class="text-gray-400 hover:text-orange-500 transition-all flex items-center gap-2 group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Reader</span>
                </button>
                <div class="flex items-center gap-2 group">
                    <svg class="w-5 h-5 text-gray-400 group-hover:text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    <div class="w-24 h-1 bg-white/10 rounded-full relative cursor-pointer">
                        <div id="volumeBar" class="absolute inset-0 bg-white/40 group-hover:bg-orange-500 rounded-full transition-colors" style="width: 80%"></div>
                    </div>
                </div>
            </div>
        </div>
        <audio id="audioPlayer" class="hidden"></audio>
    </div>

    <!-- Reader Modal -->
    <div id="modal" class="hidden fixed inset-0 z-40 modal-bg flex items-center justify-center p-6">
        <div class="w-full max-w-4xl flex flex-col gap-6">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-bold text-white"></h2>
                    <p id="modalAuthor" class="text-orange-500 font-medium"></p>
                </div>
                <button id="closeModal" class="text-gray-500 hover:text-white text-5xl leading-none">&times;</button>
            </div>

            <div id="stage" class="stage-container">
                <div class="stage-inner">
                    <div class="stage-front bg-[#111] border border-[#222] shadow-2xl">
                        <img id="modalCover" src="" class="w-full h-full object-contain">
                    </div>
                    <div class="stage-back p-10 overflow-y-auto transcript-container shadow-2xl">
                        <div id="transcriptContent" class="text-gray-300"></div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center">
                <button id="toggleView" class="bg-orange-600 hover:bg-orange-700 text-white px-10 py-4 rounded-full font-bold transition-all shadow-lg shadow-orange-900/30">
                    Flip to Text
                </button>
            </div>
        </div>
    </div>

    <script>
        let allBooks = [];
        let filteredBooks = [];
        let directoryHandle = null;
        const player = document.getElementById('audioPlayer');
        let currentBookId = null;

        // IndexedDB Setup for persisting Directory Handle
        const dbName = "AudiobookVaultDB";
        const storeName = "handles";

        async function getDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = () => request.result.createObjectStore(storeName);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveHandle(handle) {
            const db = await getDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(handle, "libraryDir");
            return tx.complete;
        }

        async function loadHandle() {
            const db = await getDB();
            const tx = db.transaction(storeName, "readonly");
            return new Promise((resolve) => {
                const req = tx.objectStore(storeName).get("libraryDir");
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }

        async function selectLibrary() {
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const isSecure = window.location.protocol === 'https:' || isLocalhost;

            if (!window.showDirectoryPicker) {
                if (!isSecure) {
                    alert("SECURITY BLOCKED: This feature requires a secure connection.\n\nTo fix this locally:\n1. Run 'python3 -m http.server 8000'\n2. Open 'http://localhost:8000' in your browser.\n\nIf hosting, ensure you use HTTPS.");
                } else {
                    alert("Your browser is too old or does not support the File System Access API. Please use a recent version of Chrome, Edge, or Opera.");
                }
                return;
            }
            try {
                directoryHandle = await window.showDirectoryPicker();
                await saveHandle(directoryHandle);
                await scanLibrary();
            } catch (err) {
                console.error("Directory selection cancelled or failed", err);
            }
        }

        async function verifyPermission(handle) {
            const options = { mode: 'read' };
            if ((await handle.queryPermission(options)) === 'granted') return true;
            if ((await handle.requestPermission(options)) === 'granted') return true;
            return false;
        }

        async function scanLibrary() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20 animate-pulse">Scanning folders... Please wait.</p>';
            
            const books = [];
            const files = new Map();
            
            try {
                // Recursively (or flatly) get all files
                for await (const entry of directoryHandle.values()) {
                    if (entry.kind === 'file') {
                        files.set(entry.name, entry);
                    } else if (entry.kind === 'directory' && (entry.name === 'images' || entry.name === 'transcripts' || entry.name === 'Covers')) {
                        for await (const subEntry of entry.values()) {
                            if (subEntry.kind === 'file') {
                                files.set(`${entry.name}/${subEntry.name}`, subEntry);
                            }
                        }
                    }
                }

                for (const [name, handle] of files) {
                    if (name.toLowerCase().endsWith('.opus') || name.toLowerCase().endsWith('.mp3') || name.toLowerCase().endsWith('.m4b')) {
                        const file = await handle.getFile();
                        if (file.size < 50 * 1024) continue;

                        const stem = name.substring(0, name.lastIndexOf('.'));
                        let title = stem;
                        let author = "Unknown";

                        if (stem.includes('(') && stem.endsWith(')')) {
                            title = stem.substring(0, stem.lastIndexOf('(')).trim();
                            author = stem.substring(stem.lastIndexOf('(') + 1, stem.length - 1).trim();
                        }

                        // Look for cover in various places
                        let coverHandle = files.get(`images/${stem}.jpg`) || 
                                          files.get(`Covers/${stem}.jpg`) || 
                                          files.get(`${stem}.jpg`) || 
                                          files.get(`images/${stem}.png`) || 
                                          files.get(`${stem}.png`);
                        
                        // Look for transcript
                        let transcriptHandle = null;
                        for (const ext of ['.opus.srt', '.srt', '.md', '.txt']) {
                            transcriptHandle = files.get(`transcripts/${stem}${ext}`) || files.get(`${stem}${ext}`);
                            if (transcriptHandle) break;
                        }

                        books.push({
                            id: btoa(unescape(encodeURIComponent(name))),
                            title,
                            author,
                            filename: name,
                            fileHandle: handle,
                            coverHandle,
                            transcriptHandle,
                            coverUrl: null,
                        });
                    }
                }

                allBooks = books;
                shuffleArray(allBooks);
                applyFilterAndSort();
                
                document.getElementById('selectDirBtn').innerHTML = `
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                    Library Loaded
                `;
            } catch (err) {
                console.error("Scan failed", err);
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 py-20">Error scanning library: ${err.message}</p>`;
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function applyFilterAndSort() {
            const query = document.getElementById('search').value.toLowerCase();
            filteredBooks = allBooks.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.author.toLowerCase().includes(query)
            );
            renderBooks();
        }

        function shuffleLibrary() {
            shuffleArray(allBooks);
            applyFilterAndSort();
        }

        async function renderBooks() {
            const grid = document.getElementById('booksGrid');
            if (filteredBooks.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20">No books found. Select a folder to begin.</p>';
                return;
            }
            
            grid.innerHTML = '';
            for (const book of filteredBooks) {
                const card = document.createElement('div');
                card.className = "book-card cursor-pointer group";
                card.onclick = () => openBook(book.id);
                
                // Get cover URL
                let coverSrc = 'https://via.placeholder.com/300x400?text=No+Cover';
                if (book.coverHandle) {
                    const file = await book.coverHandle.getFile();
                    coverSrc = URL.createObjectURL(file);
                    book.coverUrl = coverSrc; // Store to revoke later if needed
                }

                card.innerHTML = `
                    <div class="aspect-[3/4] bg-[#111] rounded-lg overflow-hidden border border-[#1a1a1a] shadow-lg relative">
                        <img src="${coverSrc}" 
                             loading="lazy" class="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all">
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-[11px] text-gray-300 line-clamp-1 group-hover:text-orange-500 transition-colors uppercase tracking-wider">${book.title}</h3>
                        <p class="text-[9px] text-gray-600 truncate uppercase mt-1">${book.author}</p>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function formatSRT(srtText) {
            const lines = srtText.split('\n');
            let html = '<div class="space-y-2">';
            let currentText = '';
            let currentTime = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (/^\d+$/.test(line)) continue;
                if (line.includes(' --> ')) {
                    currentTime = line.split(' --> ')[0].split(',')[0];
                    continue;
                }
                if (line === '') {
                    if (currentText) {
                        html += `<div class="srt-line"><span class="srt-time">${currentTime}</span><p class="text-lg text-gray-200">${currentText}</p></div>`;
                        currentText = '';
                    }
                    continue;
                }
                currentText += (currentText ? ' ' : '') + line;
            }
            return html + '</div>';
        }

        async function openBook(id) {
            const book = allBooks.find(b => b.id === id);
            if (!book) return;

            document.getElementById('playerBar').classList.remove('hidden');
            
            if (currentBookId !== id) {
                const audioFile = await book.fileHandle.getFile();
                if (player.src) URL.revokeObjectURL(player.src);
                player.src = URL.createObjectURL(audioFile);
                
                // Restore position
                const savedPos = localStorage.getItem(`pos_${book.id}`);
                if (savedPos) player.currentTime = parseFloat(savedPos);
                
                player.play();
                currentBookId = id;
                localStorage.setItem('lastBookId', id);
                
                document.getElementById('barTitle').textContent = book.title;
                document.getElementById('barAuthor').textContent = book.author;
                document.getElementById('barCover').src = book.coverUrl || 'https://via.placeholder.com/300x400?text=No+Cover';
            }

            document.getElementById('modalTitle').textContent = book.title;
            document.getElementById('modalAuthor').textContent = book.author;
            document.getElementById('modalCover').src = book.coverUrl || 'https://via.placeholder.com/300x400?text=No+Cover';
            
            const transcriptDiv = document.getElementById('transcriptContent');
            const toggleBtn = document.getElementById('toggleView');
            
            if (book.transcriptHandle) {
                transcriptDiv.innerHTML = '<p class="text-center py-20 text-gray-600 italic">Loading...</p>';
                toggleBtn.disabled = false;
                toggleBtn.style.opacity = '1';
                
                const tFile = await book.transcriptHandle.getFile();
                const text = await tFile.text();
                transcriptDiv.innerHTML = tFile.name.endsWith('.srt') ? formatSRT(text) : marked.parse(text);
            } else {
                transcriptDiv.innerHTML = '<div class="py-20 text-gray-700 italic text-center">No transcript available.</div>';
                toggleBtn.disabled = true;
                toggleBtn.style.opacity = '0.3';
            }

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            modal.classList.remove('is-flipped');
            document.getElementById('toggleView').textContent = 'Flip to Text';
            document.body.style.overflow = 'hidden';
        }

        function reopenCurrentBook() {
            if (currentBookId) openBook(currentBookId);
        }

        function togglePlayback() {
            if (player.paused) player.play();
            else player.pause();
        }

        player.onplay = () => {
            document.getElementById('playIcon').classList.add('hidden');
            document.getElementById('pauseIcon').classList.remove('hidden');
        };

        player.onpause = () => {
            document.getElementById('playIcon').classList.remove('hidden');
            document.getElementById('pauseIcon').classList.add('hidden');
        };

        player.ontimeupdate = () => {
            const prog = (player.currentTime / player.duration) * 100;
            document.getElementById('progressBar').style.width = prog + '%';
            document.getElementById('progressHandle').style.left = prog + '%';
            document.getElementById('currTime').textContent = formatTime(player.currentTime);
            if (!isNaN(player.duration)) {
                document.getElementById('totalTime').textContent = formatTime(player.duration);
            }
            // Save position every 5 seconds or so
            if (currentBookId && Math.floor(player.currentTime) % 5 === 0) {
                localStorage.setItem(`pos_${currentBookId}`, player.currentTime);
            }
        };

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        document.getElementById('progressContainer').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            player.currentTime = pos * player.duration;
        };

        document.getElementById('toggleView').onclick = () => {
            const modal = document.getElementById('modal');
            const isFlipped = modal.classList.toggle('is-flipped');
            document.getElementById('toggleView').textContent = isFlipped ? 'Flip to Cover' : 'Flip to Text';
        };

        document.getElementById('closeModal').onclick = () => {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        window.onclick = (e) => {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('modal').classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        };

        document.getElementById('search').addEventListener('input', applyFilterAndSort);

        // Auto-load library on start if handle exists
        async function init() {
            const grid = document.getElementById('booksGrid');
            directoryHandle = await loadHandle();
            
            if (directoryHandle) {
                // Change button to "Resume" state
                const btn = document.getElementById('selectDirBtn');
                btn.classList.replace('bg-orange-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-orange-700', 'hover:bg-blue-700');
                btn.innerHTML = `
                    <svg class="w-3 h-3 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A1 1 0 0111.293 2.293l4.414 4.414a1 1 0 01.293.707V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
                    Resume Library
                `;
                
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <h2 class="text-2xl font-bold mb-4">Welcome Back!</h2>
                        <p class="text-gray-400 mb-8">Click "Resume Library" above to re-authorize access to your audiobooks.</p>
                        <button onclick="selectLibrary()" class="bg-white/5 border border-white/10 hover:bg-white/10 px-8 py-3 rounded-full text-sm font-bold transition-all">
                            Or Select a New Folder
                        </button>
                    </div>
                `;
            } else {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <div class="mb-8 inline-block p-6 bg-orange-600/10 rounded-full">
                            <svg class="w-16 h-16 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        </div>
                        <h2 class="text-3xl font-black mb-4 uppercase italic">Your Library is Empty</h2>
                        <p class="text-gray-400 mb-8 max-w-md mx-auto text-lg">Select the folder containing your audiobooks to start listening. No files will be uploaded.</p>
                        <button onclick="selectLibrary()" class="bg-orange-600 hover:bg-orange-700 px-12 py-4 rounded-full text-sm font-black uppercase tracking-widest text-white transition-all shadow-2xl shadow-orange-900/40">
                            Select Library Folder
                        </button>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
